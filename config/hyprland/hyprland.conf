# NexusWins - Default Hyprland Config
# A world of only victors.

# Source modular configs
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/animations.conf

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $accent1 $accent2 45deg
    col.inactive_border = $inactive
    layout = dwindle
}

# Decoration
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 8
        passes = 2
    }
    drop_shadow = true
    shadow_range = 15
    shadow_color = rgba(0,0,0,0.4)
}

# Input
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}